# Render Blueprint — single web service (API + static frontend)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: patentbaazar
    runtime: node
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
